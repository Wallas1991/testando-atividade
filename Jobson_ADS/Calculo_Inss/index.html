<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo INSS 2025</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="calculator-container">
        <h1>Calculadora INSS 2025</h1>
        <div class="input-group">
            <label for="salarioBruto">Salário Bruto (R$)</label>
            <input type="number" id="salarioBruto" placeholder="Ex: 3000.00">
        </div>
        <button onclick="calcularINSS()">Calcular</button> <br><br>
        <button onclick="limpaCampo()">Limpar</button>

        <div class="result" id="resultado" style="display: none;">
            <p><strong>Desconto INSS:</strong> <span id="valorDesconto"></span></p>
            <p><strong>Salário Líquido:</strong> <span id="salarioLiquido"></span></p>
            <p><strong>Alíquota Efetiva:</strong> <span id="aliquotaEfetiva"></span></p>
        </div>
    </div>
    <div>asd</div>
</body>
<script src="script.js"></script>

</html>
